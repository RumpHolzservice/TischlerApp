      <button class="pin-btn" onclick="pinPress('del')" style="font-size:13px;color:#8b7355">PIN<br>ändern</button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="pinPress('back')">⌫</button>

  <div id="root"></div>

  <script>
    // ── PIN Logik ──────────────────────────────────────────────────────────────
    const PIN_KEY = "hr_pin";
    const SESSION_KEY = "hr_session";
    let pinInput = "";
    let settingPin = false;
    let newPinBuffer = "";

    function pinPress(val) {
      const storedPin = localStorage.getItem(PIN_KEY);
      const err = document.getElementById("pinError");
      const hint = document.getElementById("pinHint");

      // PIN ändern
      if (val === "del") {
        settingPin = true; newPinBuffer = ""; pinInput = "";
        hint.textContent = "Neuen 4-stelligen PIN eingeben:";
        err.textContent = ""; updateDots(); return;
      }
      if (val === "back") { pinInput = pinInput.slice(0,-1); updateDots(); return; }

      pinInput += val;
      updateDots();

      if (pinInput.length < 4) return;

      if (settingPin) {
        if (!newPinBuffer) {
          newPinBuffer = pinInput; pinInput = "";
          hint.textContent = "PIN wiederholen:"; updateDots(); return;
        }
        if (newPinBuffer === pinInput) {
          localStorage.setItem(PIN_KEY, pinInput);
          sessionStorage.setItem(SESSION_KEY, "1");
          unlock(); return;
        } else {
          err.textContent = "PINs stimmen nicht überein – nochmal:";
          pinInput = ""; newPinBuffer = ""; updateDots(); return;
        }
      }

      // Erster Start – PIN setzen
      if (!storedPin) {
        if (!newPinBuffer) {
          newPinBuffer = pinInput; pinInput = "";
          hint.textContent = "PIN wiederholen:"; err.textContent=""; updateDots(); return;
        }
        if (newPinBuffer === pinInput) {
          localStorage.setItem(PIN_KEY, pinInput);
          sessionStorage.setItem(SESSION_KEY, "1");
          unlock(); return;
        } else {
          err.textContent = "PINs stimmen nicht überein – nochmal:";
          pinInput = ""; newPinBuffer = ""; updateDots(); return;
        }
      }

      // PIN prüfen
      if (pinInput === storedPin) {
        sessionStorage.setItem(SESSION_KEY, "1");
        unlock();
      } else {
        err.textContent = "Falscher PIN – nochmal versuchen";
        pinInput = ""; updateDots();
      }
    }

    function updateDots() {
      document.querySelectorAll(".pin-dot").forEach((d,i) => {
        d.classList.toggle("filled", i < pinInput.length);
      });
    }

    function unlock() {
      document.getElementById("pin-screen").classList.add("hidden");
    }

    // Session check – nach Entsperren in dieser Sitzung nicht mehr fragen
    window.addEventListener("DOMContentLoaded", () => {
      const storedPin = localStorage.getItem(PIN_KEY);
      if (sessionStorage.getItem(SESSION_KEY) === "1") { unlock(); return; }
      if (!storedPin) {
        document.getElementById("pinHint").textContent = "Ersten 4-stelligen PIN festlegen:";
      }
    });

    // Service Worker registrieren
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/TischlerApp/sw.js", { scope: "/TischlerApp/" }).catch(()=>{});
    }
  </script>

function tageBis(d) {
  if (!d) return null;
  const h = new Date(); h.setHours(0,0,0,0);
  return Math.round((new Date(d) - h) / 86400000);
}
function fmtDate(d, opts) {
  if (!d) return "";
  return new Date(d).toLocaleDateString("de-DE", opts || { day:"2-digit", month:"short", year:"numeric" });
}
function googleLink(t, kunde, auftrag) {
  if (!t.datum) return null;
  const s = t.datum.replace(/-/g,"") + "T" + (t.uhrzeit||"08:00").replace(":","") + "00";
  const e = new Date(t.datum+"T"+(t.uhrzeit||"08:00"));
  e.setMinutes(e.getMinutes()+(t.dauer||60));
  const end = e.toISOString().replace(/[-:]/g,"").split(".")[0];
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.titel+" – "+kunde)}&dates=${s}/${end}&details=${encodeURIComponent("Auftrag: "+auftrag+"\n"+(t.notiz||""))}`;
}

function normalizePdfLine(s) {
  return (s || "").replace(/\s+/g, " ").trim();
}
function parseEuroNumber(s) {
  if (!s) return 0;
  return Number(String(s).replace(/[()]/g, "").replace(/\./g, "").replace(",", ".").replace(/[^\d.-]/g, "")) || 0;
}
function parseGermanDateToIso(s) {
  const m = String(s || "").match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : "";
}
function extractPdfLines(items) {
  const rows = [];
  const sorted = [...items].sort((a,b) => {
    const ay = a.transform[5], by = b.transform[5];
    if (Math.abs(by - ay) > 2) return by - ay;
    return a.transform[4] - b.transform[4];
  });
  for (const item of sorted) {
    const str = normalizePdfLine(item.str);
    if (!str) continue;
    const y = item.transform[5];
    let row = rows.find(r => Math.abs(r.y - y) <= 2);
    if (!row) {
      row = { y, parts: [] };
      rows.push(row);
    }
    row.parts.push({ x: item.transform[4], str });
  }
  return rows
    .sort((a,b) => b.y - a.y)
    .map(r => r.parts.sort((a,b) => a.x - b.x).map(p => p.str).join(" "))
    .map(normalizePdfLine)
    .filter(Boolean);
}
function isMetaNoiseLine(line) {
  return /^(Seite \d+\/\d+|Übertrag\b|Pos\.|Bezeichnung\b|Menge\b|Einzel\b|Gesamt\b|Holzservice Rump\b|Steuernummer:|Volksbank|IBAN:|BIC:|Tel\.:|www\.|p\.rump@)/i.test(line);
}
function parseOfferPositions(lines) {
  const positions = [];
  let current = null;
  const finish = () => {
    if (!current) return;
    current.title = normalizePdfLine(current.title || "");
    current.details = normalizePdfLine((current.details || []).join(" "));
    current.qtyText = normalizePdfLine(current.qtyText || "");
    if (current.title) positions.push(current);
    current = null;
  };
  for (const raw of lines) {
    const line = normalizePdfLine(raw);
    if (!line || isMetaNoiseLine(line) || /^Zwischensumme\b/i.test(line) || /^Umsatzsteuer\b/i.test(line) || /^Gesamtbetrag\b/i.test(line) || /^Zahlbar\b/i.test(line)) continue;
    const startMatch = line.match(/^((?:O\d+)|\d+)\s+(.*)$/i);
    const qtyMatch = line.match(/^(\d+(?:[.,]\d+)?)\s+(Stück|Stk\.?|qm|m²|m2|lfm|Pauschal|Std\.?|Stunden?)\s+([()0-9.,]+)(?:\s+([()0-9.,]+))?$/i);
    if (startMatch) {
      finish();
      const pos = startMatch[1];
      const rest = startMatch[2] || "";
      current = {
        pos,
        optional: /^O\d+/i.test(pos) || /optionale position/i.test(line),
        title: rest,
        details: [],
        qtyText: "",
        einzelpreis: 0,
        gesamtpreis: 0
      };
      continue;
    }
    if (!current) continue;
    if (qtyMatch) {
      current.qtyText = `${qtyMatch[1]} ${qtyMatch[2]}`;
      current.einzelpreis = parseEuroNumber(qtyMatch[3]);
      current.gesamtpreis = parseEuroNumber(qtyMatch[4] || qtyMatch[3]);
      finish();
      continue;
    }
    current.details.push(line);
  }
  finish();
  return positions;
}
function parseCustomerBlock(page1Lines) {
  const metaIdx = page1Lines.findIndex(l => /Angebotsnr/i.test(l));
  const searchLines = (metaIdx >= 0 ? page1Lines.slice(Math.max(0, metaIdx - 8), metaIdx) : page1Lines).map(normalizePdfLine);
  const cleaned = searchLines.filter(l =>
    l &&
    !isMetaNoiseLine(l) &&
    !/^Zwischensumme\b/i.test(l) &&
    !/^Angebot\b/i.test(l) &&
    !/Gerne bieten wir/i.test(l) &&
    !/^Normtür\b/i.test(l)
  );
  let name = "";
  let address = "";
  for (let i = 0; i < cleaned.length; i++) {
    const line = cleaned[i];
    if (/^(Herrn?|Frau|Firma)\b/i.test(line) || (i === 0 && cleaned.length >= 2)) {
      name = line.replace(/^(Herrn?|Frau|Firma)\s+/i, "").trim();
      const addrLines = cleaned.slice(i + 1).filter(l => /\d/.test(l));
      address = addrLines.join(", ");
      break;
    }
  }
  if (!name && cleaned.length) name = cleaned[0];
  if (!address) {
    const addr = cleaned.filter(l => /\d/.test(l) && !/AG\d+/i.test(l));
    address = addr.join(", ");
  }
  return { kunde: name || "", adresse: address || "" };
}
function parseOfferText(text, pagesLines, fileName) {
  const lines = text.split(/\n+/).map(normalizePdfLine).filter(Boolean);
  const page1 = pagesLines[0] || [];
  const nrMatch = text.match(/\bAG\d{4}\b/i);
  const dateMatches = [...text.matchAll(/\b\d{2}\.\d{2}\.\d{4}\b/g)].map(m => m[0]);
  const totalMatch = text.match(/Gesamtbetrag\s+([0-9.,]+)/i);
  const customer = parseCustomerBlock(page1);
  const positions = parseOfferPositions(lines);
  const firstRequired = positions.find(p => !p.optional) || positions[0] || null;
  const optionalTitles = positions.filter(p => p.optional).map(p => p.title).filter(Boolean);
  const offerNr = nrMatch ? nrMatch[0].toUpperCase() : "";
  const createdDate = dateMatches[0] || "";
  const validUntil = dateMatches[1] || "";
  const noteParts = [
    offerNr,
    firstRequired?.title || "",
    optionalTitles.length ? `Optional: ${optionalTitles.join("; ")}` : "",
    `Import aus PDF: ${fileName}`
  ].filter(Boolean);
  return {
    fileName,
    angebotNr: offerNr,
    datum: createdDate,
    gueltigBis: validUntil,
    kunde: customer.kunde,
    adresse: customer.adresse,
    auftrag: firstRequired?.title || (offerNr ? `Angebot ${offerNr}` : "PDF-Angebot"),
    budget: totalMatch ? parseEuroNumber(totalMatch[1]) : positions.filter(p => !p.optional).reduce((s,p) => s + Number(p.gesamtpreis || 0), 0),
    positions,
    bestellungen: positions.filter(p => !p.optional).map((p, idx) => ({
      id: Date.now() + idx,
      material: p.title || `Position ${p.pos}`,
      menge: p.qtyText || "",
      lieferant: "",
      bestellt: false,
      liefertermin: "",
      erhalten: false
    })),
    notiz: noteParts.join(" · ")
  };
}
async function parseOfferPdfFile(file) {
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  const pagesLines = [];
  let textParts = [];
  for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++) {
    const page = await pdf.getPage(pageNo);
    const content = await page.getTextContent();
    const lines = extractPdfLines(content.items || []);
    pagesLines.push(lines);
    textParts.push(lines.join("\n"));
  }
  const text = textParts.join("\n");
  return parseOfferText(text, pagesLines, file.name);
}

  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || `API Fehler ${r.status}`);
  }
  const d = await r.json();

function googleCalLink(t, extra) {
  if (!t.datum) return null;
  const p = t.datum.split(".");
  if (p.length !== 3) return null;
  const d = `${p[2]}${p[1].padStart(2,"0")}${p[0].padStart(2,"0")}`;
  const uhr = (t.uhrzeit||"08:00").replace(":","");
  const h = parseInt((t.uhrzeit||"08:00").split(":")[0]);
  const m = (t.uhrzeit||"08:00").split(":")[1];
  const endH = String(h+1).padStart(2,"0");
  const start = `${d}T${uhr}00`, end = `${d}T${endH}${m}00`;
  const title = encodeURIComponent(t.beschreibung+(extra?` – ${extra}`:""));
  const details = encodeURIComponent(`Typ: ${t.typ||""}\nKunde: ${t.kunde||""}`);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}`;
}

function downloadICS(termine) {
  const pad = n => String(n).padStart(2,"0");
  const now = new Date();
  const dtStamp = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}T${pad(now.getHours())}${pad(now.getMinutes())}00Z`;
  let cal = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Tischler KI//DE\r\n";
  termine.forEach((t,i) => {
    if (!t.datum) return;
    const p = t.datum.split(".");
    if (p.length !== 3) return;
    const d = `${p[2]}${p[1].padStart(2,"0")}${p[0].padStart(2,"0")}`;
    const uhr = (t.uhrzeit||"08:00").replace(":","");
    const h = parseInt((t.uhrzeit||"08:00").split(":")[0]);
    const m = (t.uhrzeit||"08:00").split(":")[1];
    const endH = String(h+1).padStart(2,"0");
    cal += `BEGIN:VEVENT\r\nUID:tki-${Date.now()}-${i}@rump\r\nDTSTAMP:${dtStamp}\r\n`;
    cal += `DTSTART:${d}T${uhr}00\r\nDTEND:${d}T${endH}${m}00\r\n`;
    cal += `SUMMARY:${(t.beschreibung||"Termin").replace(/[,;\\]/g,"\\$&")}\r\n`;
    cal += `DESCRIPTION:${(t.typ||"")} · ${(t.kunde||"")}\r\n`;
    cal += `END:VEVENT\r\n`;
  });
  cal += "END:VCALENDAR";
  const blob = new Blob([cal], { type:"text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="termine.ics"; a.click();
  URL.revokeObjectURL(url);
}

  const [result, setResult] = useState(null);
  const [savingTermin, setSavingTermin] = useState(null);

  async function analyze() {
    if (!input.trim()) return;
    setLoading(true); setResult(null);
    try {
      const sys = `Du bist Assistent für Holzservice Rump, einen selbständigen Tischler in Deutschland.
Analysiere die Nachricht und extrahiere alle relevanten Informationen.
Antworte NUR mit JSON (kein Markdown, keine Erklärung):
{
  "zusammenfassung":"1-2 Sätze",
  "termine":[{"datum":"TT.MM.JJJJ oder leer","uhrzeit":"HH:MM oder leer","beschreibung":"...","typ":"Kundentermin|Montage|Lieferung|Besichtigung","kunde":"Name oder leer"}],
  "auftraege":[{"kunde":"...","beschreibung":"...","adresse":"...","prioritaet":"hoch|mittel|niedrig"}],
  "bestellungen":[{"artikel":"...","menge":"...","lieferant":"...","notiz":"..."}],
  "aufgaben":[{"aufgabe":"...","faellig":"..."}]
}
Wenn eine Kategorie leer ist: []. Datum immer TT.MM.JJJJ. Aktuelle Jahreszahl: 2026.`;
      const text = await callKI(apiKey, sys, input);
      setResult(parseKIJSON(text));
    } catch(e) {
      const isNetwork = e.message==="Failed to fetch"||e.message.includes("fetch");
      setResult({ error: isNetwork
        ? "🔑 Verbindung fehlgeschlagen – API-Key fehlt.\n\nLösung: Scroll nach oben → 🤖-Button → API-Key von console.anthropic.com eintragen.\n\nOder: Datei in Claude.ai öffnen (dort kein Key nötig)."
        : e.message });
    }
    finally { setLoading(false); }
  }

  function parseGermanDate(s) {
    if (!s) return "";
    const p = s.split("."); if (p.length===3) return `${p[2].padStart(4,"0")}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
    return "";
  }

  function terminSpeichern(t, projektId) {
    if (!projektId) return;
    const neuerTermin = { id:Date.now(), titel:t.beschreibung||"KI-Termin", datum:parseGermanDate(t.datum)||new Date().toISOString().slice(0,10), uhrzeit:t.uhrzeit||"", dauer:60, notiz:`Via KI · ${t.typ||""}` };
    const proj = projekte.find(p=>p.id===Number(projektId));
    if (!proj) return;
    onNeueProjekt({...proj, termine:[...(proj.termine||[]),neuerTermin]});
    setSavingTermin(null);
    setResult(prev=>({...prev, _saved:(prev._saved||[]).concat(t.beschreibung)}));
  }

  const badgeFarbe = { hoch:"#c0392b", mittel:"#d4a017", niedrig:"#2e7d5e" };
  const allTermine = result?.termine?.filter(t=>t.datum)||[];

  return (
    <div style={{ margin:"0 28px 12px", background:open?"#fff":"transparent", border:`1.5px solid ${open?"#d6cfc4":"transparent"}`, borderRadius:10, overflow:"hidden" }}>
      <div onClick={()=>setOpen(o=>!o)} style={{ padding:"10px 14px", display:"flex", alignItems:"center", gap:10, cursor:"pointer", background:open?"#fff":"#faf7f2", borderRadius:open?0:10, borderBottom:open?"1px solid #ede8df":"none" }}>
        <span style={{fontSize:16}}>🤖</span>
        <div style={{flex:1}}>
          <span style={{fontWeight:700,fontSize:13}}>KI-Assistent</span>
          <span style={{fontSize:11,color:"#8b7355",marginLeft:8}}>WhatsApp & E-Mail analysieren · Aufträge & Termine erkennen</span>
        </div>
        <span style={{fontSize:12,color:"#aaa",fontFamily:"monospace"}}>{open?"▲":"▼"}</span>
      </div>

      {open && (
        <div style={{padding:"14px 18px 18px"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            placeholder={'WhatsApp-Nachricht oder E-Mail hier einfügen …\n\nz.B.: "[7.4., 12:22] Reiner: Hi Patrick, Ostern gut verbracht, hast du einen Plan wann du kommst? In der Regel bin ich um 16:45 zuhause. Gruß Rainer"'}
            style={{width:"100%",border:"1.5px solid #d6cfc4",borderRadius:8,padding:"10px 12px",fontSize:13,fontFamily:"Georgia,serif",minHeight:110,resize:"vertical",background:"#fffdf8",boxSizing:"border-box"}} />
          <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
            <button onClick={analyze} disabled={loading||!input.trim()}
              style={{background:"#2b2217",color:"#f5f0e8",border:"none",borderRadius:8,padding:"8px 20px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"Georgia,serif",opacity:loading||!input.trim()?0.5:1}}>
              {loading?"⏳ KI analysiert…":"🔍 Analysieren"}
            </button>
            {input&&<button onClick={()=>{setInput("");setResult(null);}} style={{background:"none",border:"1.5px solid #d6cfc4",color:"#888",borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>Leeren</button>}
          </div>

          {result?.error && (
            <div style={{marginTop:12,background:"#fdf0ef",color:"#8e2f24",border:"1px solid #e6b8b2",borderRadius:8,padding:"12px 14px",fontSize:13,whiteSpace:"pre-line",lineHeight:1.6}}>
              {result.error}
            </div>
          )}

          {result && !result.error && (
            <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:12}}>
              {result.zusammenfassung && (
                <div style={{background:"#fef9ec",border:"1px solid #f0d890",borderRadius:8,padding:"10px 14px",fontSize:13,borderLeft:"4px solid #d4a017"}}>
                  📌 <strong>{result.zusammenfassung}</strong>
                </div>
              )}

              {result.termine?.length > 0 && (
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                    <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,opacity:0.4}}>📅 Erkannte Termine ({result.termine.length})</div>
                    {allTermine.length>0 && (
                      <button onClick={()=>downloadICS(allTermine)}
                        style={{background:"#4285f4",color:"#fff",border:"none",borderRadius:6,padding:"4px 11px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                        ⬇️ Alle als .ics (Kalender-Import)
                      </button>
                    )}
                  </div>
                  {result.termine.map((t,i)=>{
                    const gcUrl = googleCalLink(t, t.kunde);
                    const saved = result._saved?.includes(t.beschreibung);
                    return (
                      <div key={i} style={{background:"#fff",border:"1.5px solid #ede8df",borderRadius:8,padding:"10px 13px",marginBottom:7}}>
                        <div style={{fontWeight:700,marginBottom:3}}>{t.beschreibung}</div>
                        <div style={{fontSize:12,color:"#666"}}>
                          {t.datum&&`📅 ${t.datum} `}{t.uhrzeit&&`🕐 ${t.uhrzeit} Uhr `}{t.kunde&&`👤 ${t.kunde}`}
                          <span style={{marginLeft:6,background:"#f1f3f4",borderRadius:5,padding:"1px 7px",fontSize:11}}>{t.typ}</span>
                        </div>
                        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                          {gcUrl && (
                            <a href={gcUrl} target="_blank" rel="noopener noreferrer"
                              style={{background:"#4285f4",color:"#fff",borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:700,textDecoration:"none",display:"inline-block"}}>
                              📆 Google Kalender
                            </a>
                          )}
                          {t.datum && (
                            <button onClick={()=>downloadICS([t])}
                              style={{background:"none",border:"1.5px solid #4285f4",color:"#4285f4",borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                              ⬇️ .ics
                            </button>
                          )}
                          {saved ? (
                            <span style={{fontSize:12,color:"#2e7d5e",fontWeight:700,padding:"5px 0"}}>✅ Im Projekt gespeichert</span>
                          ) : savingTermin?.index===i ? (
                            <>
                              <select onChange={e=>setSavingTermin(s=>({...s,projektId:e.target.value}))}
                                style={{border:"1.5px solid #d6cfc4",borderRadius:6,padding:"4px 8px",fontSize:12,fontFamily:"Georgia,serif",background:"#fff"}}>
                                <option value="">– Projekt wählen –</option>
                                {projekte.map(p=><option key={p.id} value={p.id}>{p.kunde} – {p.auftrag}</option>)}
                              </select>
                              <button onClick={()=>terminSpeichern(t,savingTermin.projektId)} disabled={!savingTermin.projektId}
                                style={{background:"#2e7d5e",color:"#fff",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",opacity:savingTermin.projektId?1:0.4}}>
                                ✓ Speichern
                              </button>
                              <button onClick={()=>setSavingTermin(null)} style={{background:"none",border:"1.5px solid #d6cfc4",color:"#888",borderRadius:6,padding:"4px 9px",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>✕</button>
                            </>
                          ) : (
                            <button onClick={()=>setSavingTermin({index:i,projektId:""})}
                              style={{background:"none",border:"1.5px solid #2e7d5e",color:"#2e7d5e",borderRadius:6,padding:"4px 11px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                              + In Projekt
                            </button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {result.auftraege?.length > 0 && (
                <div>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,opacity:0.4,marginBottom:7}}>💼 Aufträge / Anfragen ({result.auftraege.length})</div>
                  {result.auftraege.map((a,i)=>(
                    <div key={i} style={{background:"#fff",border:"1.5px solid #ede8df",borderRadius:8,padding:"10px 13px",marginBottom:7}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                        <span style={{fontWeight:700}}>{a.kunde}</span>
                        {a.prioritaet&&<span style={{fontSize:11,background:badgeFarbe[a.prioritaet]+"15",color:badgeFarbe[a.prioritaet],border:`1px solid ${badgeFarbe[a.prioritaet]}`,borderRadius:5,padding:"1px 7px",fontWeight:700}}>{a.prioritaet}</span>}
                      </div>
                      <div style={{fontSize:12,color:"#666"}}>{a.beschreibung}{a.adresse&&` · 📍 ${a.adresse}`}</div>
                      <button onClick={()=>onNeueProjekt({_prefill:true,kunde:a.kunde,auftrag:a.beschreibung,adresse:a.adresse||""})}
                        style={{marginTop:7,background:"#d4a017",color:"#2b2217",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                        + Projekt anlegen
                      </button>
                    </div>
                  ))}
                </div>
              )}

              {result.bestellungen?.length > 0 && (
                <div>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,opacity:0.4,marginBottom:7}}>📦 Material / Bestellungen ({result.bestellungen.length})</div>
                  {result.bestellungen.map((b,i)=>(
                    <div key={i} style={{background:"#fff",border:"1.5px solid #ede8df",borderRadius:8,padding:"8px 13px",marginBottom:7,fontSize:13}}>
                      <strong>{b.artikel}</strong>
                      <div style={{fontSize:12,color:"#666"}}>{b.menge&&`Menge: ${b.menge} `}{b.lieferant&&`· ${b.lieferant} `}{b.notiz&&`· ${b.notiz}`}</div>
                    </div>
                  ))}
                </div>
              )}

              {result.aufgaben?.length > 0 && (
                <div>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,opacity:0.4,marginBottom:7}}>✅ Aufgaben ({result.aufgaben.length})</div>
                  {result.aufgaben.map((a,i)=>(
                    <div key={i} style={{background:"#fff",border:"1.5px solid #ede8df",borderRadius:8,padding:"8px 13px",marginBottom:7,fontSize:13}}>
                      {a.aufgabe}{a.faellig&&<span style={{color:"#888",fontSize:12}}> · Fällig: {a.faellig}</span>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── CHECKLISTE TAB ───────────────────────────────────────────────────────────
function ChecklisteTab({ p, onChange }) {
  const [neu, setNeu] = useState("");
  function addItem() {
    if (!neu.trim()) return;
    onChange({...p, checkliste:[...p.checkliste, { id:Date.now(), text:neu.trim(), erledigt:false }]});
    setNeu("");
  }
  function toggleItem(id) { onChange({...p, checkliste:p.checkliste.map(c => c.id===id?{...c,erledigt:!c.erledigt}:c)}); }
  function deleteItem(id) { onChange({...p, checkliste:p.checkliste.filter(c=>c.id!==id)}); }
  const done = p.checkliste.filter(c=>c.erledigt).length;
  const total = p.checkliste.length;
  return (
    <div>
      <div style={secTitle}>Checkliste</div>
      {total > 0 && (
        <div style={{ marginBottom:10, display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ flex:1, height:6, background:"#ede8df", borderRadius:99, overflow:"hidden" }}>
            <div style={{ width:`${total>0?(done/total)*100:0}%`, height:"100%", background:done===total&&total>0?"#2e7d5e":"#d4a017", borderRadius:99, transition:"width 0.3s" }} />
          </div>
          <span style={{ fontSize:12, color:"#888" }}>{done}/{total}</span>
        </div>
      )}
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        {p.checkliste.map(c => (
          <div key={c.id} style={{ display:"flex", alignItems:"center", gap:10, background:c.erledigt?"#f0faf5":"#fff", border:"1.5px solid #ede8df", borderRadius:8, padding:"8px 12px" }}>
            <span onClick={()=>toggleItem(c.id)} style={{ fontSize:20, cursor:"pointer", userSelect:"none" }}>{c.erledigt?"✅":"⬜"}</span>
            <span style={{ flex:1, fontSize:14, textDecoration:c.erledigt?"line-through":"none", color:c.erledigt?"#999":"#2b2217" }}>{c.text}</span>
            <button onClick={()=>deleteItem(c.id)} style={btnOutline("#c0392b")}>🗑</button>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:8, marginTop:10 }}>
        <input value={neu} onChange={e=>setNeu(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="Neuer Punkt…" style={{ ...inp, flex:1 }} />
        <button onClick={addItem} style={{ background:"#2b2217", color:"#f5f0e8", border:"none", borderRadius:7, padding:"6px 16px", fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif" }}>+ Hinzufügen</button>
      </div>
    </div>
  );
}

// ─── TERMINE TAB ──────────────────────────────────────────────────────────────
function TermineTab({ p, onChange }) {
  const leer = { id:null, titel:"", datum:"", uhrzeit:"08:00", dauer:60, notiz:"" };
  const [form, setForm] = useState(leer);
  const [editId, setEditId] = useState(null);
  const [showForm, setShowForm] = useState(false);

  function startNeu() { setForm({...leer,id:Date.now()}); setEditId(null); setShowForm(true); }
  function startEdit(t) { setForm({...t}); setEditId(t.id); setShowForm(true); }
  function speichern() {
    if (!form.titel||!form.datum) return;
    const termine = editId ? p.termine.map(t=>t.id===editId?form:t) : [...p.termine, form];
    onChange({...p, termine}); setShowForm(false); setEditId(null); setForm(leer);
  }
  function loeschen(id) { onChange({...p, termine:p.termine.filter(t=>t.id!==id)}); }

  return (
    <div>
      <div style={secTitle}>Termine & Google Kalender</div>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {[...p.termine].sort((a,b)=>a.datum.localeCompare(b.datum)).map(t => {
          const tage = tageBis(t.datum);
          const gc = googleLink(t, p.kunde, p.auftrag);
          return (
            <div key={t.id} style={{ background:"#fff", border:"1.5px solid #ede8df", borderRadius:8, padding:"10px 14px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", opacity:tage!==null&&tage<0?0.6:1 }}>
              <div style={{ fontSize:22 }}>📅</div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700 }}>{t.titel}</div>
                <div style={{ fontSize:12, color:"#666", marginTop:2 }}>
                  {fmtDate(t.datum,{weekday:"short",day:"2-digit",month:"long",year:"numeric"})}
                  {t.uhrzeit&&` · ${t.uhrzeit} Uhr`}{t.dauer&&` · ${t.dauer} min`}
                </div>
                {t.notiz&&<div style={{ fontSize:12, color:"#8b7355", fontStyle:"italic" }}>{t.notiz}</div>}
              </div>
              {tage!==null&&tage>=0&&<Badge t={tage} />}
              {gc&&<a href={gc} target="_blank" rel="noopener noreferrer" style={{ background:"#4285f4", color:"#fff", borderRadius:7, padding:"5px 12px", fontSize:12, fontWeight:700, textDecoration:"none" }}>📆 Google Kalender</a>}
              <button onClick={()=>startEdit(t)} style={btnOutline("#d4a017")}>✏️</button>
              <button onClick={()=>loeschen(t.id)} style={btnOutline("#c0392b")}>🗑</button>
            </div>
          );
        })}
        {p.termine.length===0&&<div style={{ fontSize:13, color:"#aaa", fontStyle:"italic" }}>Noch keine Termine.</div>}
      </div>

      {showForm && (
        <div style={{ background:"#fffdf5", border:"1.5px dashed #d4a017", borderRadius:8, padding:"14px", marginTop:10 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 130px 90px 80px", gap:8, marginBottom:8 }}>
            <div><label style={labelSt}>Bezeichnung *</label><input value={form.titel} onChange={e=>setForm(f=>({...f,titel:e.target.value}))} placeholder="z.B. Aufmaß vor Ort" style={inp} autoFocus /></div>
            <div><label style={labelSt}>Datum *</label><input type="date" value={form.datum} onChange={e=>setForm(f=>({...f,datum:e.target.value}))} style={inp} /></div>
            <div><label style={labelSt}>Uhrzeit</label><input type="time" value={form.uhrzeit} onChange={e=>setForm(f=>({...f,uhrzeit:e.target.value}))} style={inp} /></div>
            <div><label style={labelSt}>Dauer (min)</label><input type="number" value={form.dauer} onChange={e=>setForm(f=>({...f,dauer:Number(e.target.value)}))} style={inp} /></div>
          </div>
          <input value={form.notiz} onChange={e=>setForm(f=>({...f,notiz:e.target.value}))} placeholder="Notiz (optional)" style={{...inp,marginBottom:8}} />
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={speichern} style={{ background:"#2e7d5e", color:"#fff", border:"none", borderRadius:6, padding:"6px 18px", fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif" }}>✓ Speichern</button>
            <button onClick={()=>{setShowForm(false);setEditId(null);}} style={btnOutline("#888")}>Abbrechen</button>
          </div>
        </div>
      )}
      {!showForm&&<button onClick={startNeu} style={{ marginTop:10, background:"#4285f4", color:"#fff", border:"none", borderRadius:7, padding:"7px 18px", fontSize:13, fontWeight:700, cursor:"pointer" }}>+ Termin & Google Kalender</button>}
    </div>
  );
}

// ─── MATERIAL TAB ─────────────────────────────────────────────────────────────

// ─── STUNDEN TAB ─────────────────────────────────────────────────────────────
function StundenTab({ p, onChange, apiKey }) {
  const leer = { id:null, datum:"", taetigkeit:"", stunden:1, stundensatz:65 };
  const [form, setForm] = useState(leer);
  const [editId, setEditId] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [kiOpen, setKiOpen] = useState(false);
  const [kiText, setKiText] = useState("");
  const [kiLoading, setKiLoading] = useState(false);

  async function kiAusfuellen() {
    if (!kiText.trim()) return;
    setKiLoading(true);
    try {
      const sys = `Du bist Assistent für einen Tischler. Extrahiere aus dem Text Informationen für einen Stundeneintrag.
Antworte NUR mit JSON (kein Markdown):
{"datum":"JJJJ-MM-TT oder leer","taetigkeit":"Text","stunden":Zahl,"stundensatz":65}
Datum: Wenn "heute" → leerlassen, wenn ein Wochentag/Datum genannt → entsprechendes Datum. Stunden als Dezimalzahl (z.B. 5.5 für 5,5 Stunden).`;
      const text = await callKI(apiKey, sys, kiText, 400);
      const d = parseKIJSON(text);
      setForm(f => ({
        ...f,
        id: f.id || Date.now(),
        datum: d.datum || new Date().toISOString().slice(0,10),
        taetigkeit: d.taetigkeit || f.taetigkeit,
        stunden: d.stunden || f.stunden,
        stundensatz: d.stundensatz || f.stundensatz
      }));
      setShowForm(true);
      setKiOpen(false);
      setKiText("");
    } catch(e) { alert("KI-Fehler: " + e.message); }
    finally { setKiLoading(false); }
  }

  function startNeu() { setForm({...leer,id:Date.now()}); setEditId(null); setShowForm(true); }
  function startEdit(s) { setForm({...s}); setEditId(s.id); setShowForm(true); }
  function speichern() {
    if (!form.datum||!form.taetigkeit) return;
    const stunden = editId ? p.stunden.map(s=>s.id===editId?form:s) : [...p.stunden,form];
    onChange({...p,stunden}); setShowForm(false); setEditId(null); setForm(leer);
  }
  function loeschen(id) { onChange({...p,stunden:p.stunden.filter(s=>s.id!==id)}); }

  const totalStunden = p.stunden.reduce((s,e)=>s+Number(e.stunden||0),0);
  const totalBetrag = p.stunden.reduce((s,e)=>s+(Number(e.stunden||0)*Number(e.stundensatz||0)),0);

  return (
    <div>
      <div style={secTitle}>Stunden erfassen</div>
      {/* KI-Schnelleingabe */}
      <div style={{ background:"#fffdf5", border:"1.5px solid #d4a017", borderRadius:8, padding:"10px 13px", marginBottom:14 }}>
        <div onClick={()=>setKiOpen(o=>!o)} style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", userSelect:"none" }}>
          <span>🤖</span>
          <span style={{ fontWeight:700, fontSize:13 }}>KI-Schnelleingabe</span>
          <span style={{ fontSize:11, color:"#8b7355" }}>– Arbeit beschreiben, KI füllt das Formular</span>
          <span style={{ marginLeft:"auto", fontSize:11, color:"#aaa" }}>{kiOpen?"▲":"▼"}</span>
        </div>
        {kiOpen && (
          <div style={{ marginTop:10 }}>
            <textarea
              value={kiText}
              onChange={e=>setKiText(e.target.value)}
              placeholder={'Beschreibe deine Arbeit:\n"Heute 6,5 Stunden bei Renneke Schreibtisch montiert, Tischplatte befestigt und Kabel verlegt"'}
              style={{ width:"100%", border:"1.5px solid #d6cfc4", borderRadius:6, padding:"8px 10px", fontSize:13, fontFamily:"Georgia,serif", minHeight:80, resize:"vertical", boxSizing:"border-box", background:"#fff" }}
              autoFocus
            />
            <div style={{ display:"flex", gap:8, marginTop:7 }}>
              <button onClick={kiAusfuellen} disabled={kiLoading||!kiText.trim()}
                style={{ background:"#2b2217", color:"#f5f0e8", border:"none", borderRadius:7, padding:"7px 18px", fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"Georgia,serif", opacity:kiLoading||!kiText.trim()?0.5:1 }}>
                {kiLoading?"⏳ KI füllt aus…":"🤖 Formular ausfüllen"}
              </button>
              <button onClick={()=>{setKiOpen(false);setKiText("");}} style={{ background:"none", border:"1.5px solid #d6cfc4", color:"#888", borderRadius:7, padding:"7px 12px", fontSize:12, cursor:"pointer", fontFamily:"Georgia,serif" }}>Abbrechen</button>
            </div>
          </div>
        )}
      </div>
      {/* Summen-Karten */}
      <div style={{ display:"flex", gap:10, marginBottom:12 }}>
        {[
          { label:"Stunden gesamt", wert:`${totalStunden.toFixed(1)} h`, farbe:"#2e7d5e" },
          { label:"Betrag gesamt", wert:`€ ${totalBetrag.toLocaleString("de-DE")}`, farbe:"#2b2217" },
        ].map(k=>(
          <div key={k.label} style={{ background:"#fff", border:`1.5px solid ${k.farbe}30`, borderLeft:`4px solid ${k.farbe}`, borderRadius:8, padding:"8px 16px", flex:1 }}>
            <div style={{ fontSize:18, fontWeight:700, color:k.farbe }}>{k.wert}</div>
            <div style={{ fontSize:11, opacity:0.6 }}>{k.label}</div>
          </div>
        ))}
      </div>
      {/* Einträge */}
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        {[...p.stunden].sort((a,b)=>b.datum.localeCompare(a.datum)).map(s=>(
          <div key={s.id} style={{ background:"#fff", border:"1.5px solid #ede8df", borderRadius:8, padding:"9px 14px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
            <div style={{ fontSize:13, color:"#666", minWidth:90 }}>{fmtDate(s.datum,{day:"2-digit",month:"short",year:"numeric"})}</div>
            <div style={{ flex:1, fontWeight:600 }}>{s.taetigkeit}</div>
            <div style={{ fontSize:13, color:"#2e7d5e", fontWeight:700, whiteSpace:"nowrap" }}>{s.stunden} h</div>
            <div style={{ fontSize:13, color:"#888", whiteSpace:"nowrap" }}>@ € {s.stundensatz}/h</div>
            <div style={{ fontSize:13, fontWeight:700, whiteSpace:"nowrap" }}>= € {(s.stunden*s.stundensatz).toLocaleString("de-DE")}</div>
            <button onClick={()=>startEdit(s)} style={btnOutline("#d4a017")}>✏️</button>
            <button onClick={()=>loeschen(s.id)} style={btnOutline("#c0392b")}>🗑</button>
          </div>
        ))}
        {p.stunden.length===0&&<div style={{ fontSize:13, color:"#aaa", fontStyle:"italic" }}>Noch keine Stunden erfasst.</div>}
      </div>
      {showForm&&(
        <div style={{ background:"#fffdf5", border:"1.5px dashed #d4a017", borderRadius:8, padding:"12px", marginTop:10 }}>
          <div style={{ display:"grid", gridTemplateColumns:"130px 1fr 80px 80px", gap:8, marginBottom:8 }}>
            <div><label style={labelSt}>Datum *</label><input type="date" value={form.datum} onChange={e=>setForm(f=>({...f,datum:e.target.value}))} style={inp} /></div>
            <div><label style={labelSt}>Tätigkeit *</label><input value={form.taetigkeit} onChange={e=>setForm(f=>({...f,taetigkeit:e.target.value}))} placeholder="z.B. Montage Küche" style={inp} autoFocus /></div>
            <div><label style={labelSt}>Stunden</label><input type="number" step="0.5" value={form.stunden} onChange={e=>setForm(f=>({...f,stunden:Number(e.target.value)}))} style={inp} /></div>
            <div><label style={labelSt}>€/Stunde</label><input type="number" value={form.stundensatz} onChange={e=>setForm(f=>({...f,stundensatz:Number(e.target.value)}))} style={inp} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={speichern} style={{ background:"#2e7d5e", color:"#fff", border:"none", borderRadius:6, padding:"6px 18px", fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif" }}>✓ Speichern</button>
            <button onClick={()=>{setShowForm(false);setEditId(null);}} style={btnOutline("#888")}>Abbrechen</button>
          </div>
        </div>
      )}
      {!showForm&&<button onClick={startNeu} style={{ marginTop:10, background:"#2b2217", color:"#f5f0e8", border:"none", borderRadius:7, padding:"7px 18px", fontSize:13, fontWeight:700, cursor:"pointer" }}>+ Stunden eintragen</button>}
    </div>
  );
}

function waLink(telefon, text) {
  const nr = (telefon||"").replace(/\D/g,"");
