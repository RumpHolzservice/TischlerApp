  return nr ? `https://wa.me/49${nr.replace(/^0/,"")}?text=${encoded}` : `https://wa.me/?text=${encoded}`;
}

// ─── PLANUNG VIEW ─────────────────────────────────────────────────────────────
function PlanungView({ projekte }) {
  const heute = new Date(); heute.setHours(0,0,0,0);
  const [wocheOffset, setWocheOffset] = useState(0);
  const [planTag, setPlanTag] = useState("heute");

  // Alle Termine aus allen Projekten zusammensammeln
  const alleTermine = projekte.flatMap(p =>
    (p.termine||[]).map(t => ({
      ...t,
      projektKunde: p.kunde,
      projektAuftrag: p.auftrag,
      projektTelefon: p.telefon||"",
      projektAdresse: p.adresse||"",
      projektId: p.id,
    }))
  ).sort((a,b) => a.datum.localeCompare(b.datum) || (a.uhrzeit||"").localeCompare(b.uhrzeit||""));

  // ── Wochenansicht ──
  const wochenStart = new Date(heute);
  wochenStart.setDate(heute.getDate() - heute.getDay() + 1 + wocheOffset*7); // Montag
  const wocheTage = Array.from({length:7}, (_,i) => {
    const d = new Date(wochenStart); d.setDate(wochenStart.getDate()+i); return d;
  });
  const ISO = d => d.toISOString().slice(0,10);
  const WOCHENTAGE = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  const MONATE2 = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];

  // ── Konflikte erkennen ──
  function hatKonflikt(t, alle) {
    if (!t.uhrzeit) return false;
    const [h,m] = t.uhrzeit.split(":").map(Number);
    const start = h*60+m, end = start+(t.dauer||60);
    return alle.some(t2 => t2.id!==t.id && t2.datum===t.datum && t2.uhrzeit && (() => {
      const [h2,m2] = t2.uhrzeit.split(":").map(Number);
      const s2=h2*60+m2, e2=s2+(t2.dauer||60);
      return start < e2 && end > s2;
    })());
  }

  // ── Tagesplan ──
  const zielTag = planTag==="heute" ? ISO(heute) : (() => { const m=new Date(heute); m.setDate(m.getDate()+1); return ISO(m); })();
  const tagesTermine = alleTermine.filter(t => t.datum===zielTag);

  // ── WhatsApp Texte ──
  function waBestaetigung(t) {
    return `Hallo ${t.projektKunde},\n\nhiermit bestätige ich unseren Termin am ${fmtDate(t.datum, {weekday:"long",day:"2-digit",month:"long"})}${t.uhrzeit?` um ${t.uhrzeit} Uhr`:""}.\n${t.projektAdresse?`\nAdresse: ${t.projektAdresse}\n`:""}\nBei Fragen gerne melden!\n\nViele Grüße\nHolzservice Rump`;
  }
  function waErinnerung(t) {
    return `Hallo ${t.projektKunde},\n\nkurze Erinnerung: Morgen bin ich bei Ihnen${t.uhrzeit?` um ${t.uhrzeit} Uhr`:""}.\n${t.projektAdresse?`Adresse: ${t.projektAdresse}\n`:""}\nBis morgen!\n\nViele Grüße\nHolzservice Rump`;
  }
  function waAnfahrt(t) {
    return `Hallo ${t.projektKunde},\n\nich bin auf dem Weg zu Ihnen und bin in ca. 30 Minuten vor Ort.\n\nBis gleich!\n\nHolzservice Rump`;
  }

  const TerminCard = ({ t, compact }) => {
    const konflikt = hatKonflikt(t, alleTermine);
    const morgen = (() => { const m=new Date(heute); m.setDate(m.getDate()+1); return ISO(m); })();
    const [waOffen, setWaOffen] = useState(false);
    return (
      <div style={{ background:"#fff", border:`1.5px solid ${konflikt?"#c0392b":"#ede8df"}`, borderLeft:`4px solid ${konflikt?"#c0392b":"#2e7d5e"}`, borderRadius:8, padding:compact?"8px 12px":"11px 14px", marginBottom:compact?4:8 }}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:10, flexWrap:"wrap" }}>
          <div style={{ flex:1, minWidth:140 }}>
            {konflikt && <div style={{ fontSize:10, fontWeight:700, color:"#c0392b", background:"#fdf0ef", borderRadius:4, padding:"1px 6px", display:"inline-block", marginBottom:4 }}>⚠️ KONFLIKT</div>}
            <div style={{ fontWeight:700, fontSize:compact?13:14 }}>{t.titel}</div>
            <div style={{ fontSize:12, color:"#8b7355", marginTop:2 }}>{t.projektKunde} · {t.projektAuftrag}</div>
            <div style={{ fontSize:12, color:"#666", marginTop:2 }}>
              {t.uhrzeit&&`🕐 ${t.uhrzeit} Uhr`}{t.dauer&&` · ${t.dauer} min`}
              {t.projektAdresse&&<><br/>📍 {t.projektAdresse}</>}
            </div>
          </div>
          <button onClick={()=>setWaOffen(o=>!o)}
            style={{ background:"#25D366", color:"#fff", border:"none", borderRadius:8, padding:"7px 13px", fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>
            💬 WhatsApp
          </button>
        </div>
        {waOffen && (
          <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:6, borderTop:"1px solid #f0ebe3", paddingTop:10 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#8b7355", textTransform:"uppercase", letterSpacing:.4, marginBottom:2 }}>Nachricht senden an {t.projektKunde}:</div>
            <a href={waLink(t.projektTelefon, waBestaetigung(t))} target="_blank" rel="noopener noreferrer"
              style={{ display:"flex", alignItems:"center", gap:8, background:"#edf7f3", border:"1px solid #b2dfc9", borderRadius:7, padding:"9px 13px", textDecoration:"none", color:"#2b2217" }}>
              <span style={{ fontSize:16 }}>✅</span>
              <div><div style={{ fontWeight:700, fontSize:13 }}>Terminbestätigung</div><div style={{ fontSize:11, color:"#666" }}>„hiermit bestätige ich unseren Termin am …"</div></div>
            </a>
            <a href={waLink(t.projektTelefon, waErinnerung(t))} target="_blank" rel="noopener noreferrer"
              style={{ display:"flex", alignItems:"center", gap:8, background:"#fef9ec", border:"1px solid #f0d890", borderRadius:7, padding:"9px 13px", textDecoration:"none", color:"#2b2217" }}>
              <span style={{ fontSize:16 }}>🔔</span>
              <div><div style={{ fontWeight:700, fontSize:13 }}>Erinnerung (1 Tag vorher)</div><div style={{ fontSize:11, color:"#666" }}>„kurze Erinnerung: Morgen bin ich bei Ihnen …"</div></div>
            </a>
            <a href={waLink(t.projektTelefon, waAnfahrt(t))} target="_blank" rel="noopener noreferrer"
              style={{ display:"flex", alignItems:"center", gap:8, background:"#f0f4ff", border:"1px solid #b8c8f0", borderRadius:7, padding:"9px 13px", textDecoration:"none", color:"#2b2217" }}>
              <span style={{ fontSize:16 }}>🚐</span>
              <div><div style={{ fontWeight:700, fontSize:13 }}>Anfahrt angekündigt</div><div style={{ fontSize:11, color:"#666" }}>„bin in ca. 30 Minuten vor Ort"</div></div>
            </a>
            {!t.projektTelefon && <div style={{ fontSize:11, color:"#c0392b", background:"#fdf0ef", borderRadius:6, padding:"6px 10px" }}>⚠️ Keine Telefonnummer im Projekt – WhatsApp öffnet sich ohne vorgewählte Nummer. Nummer im Projekt ergänzen!</div>}
          </div>
        )}
      </div>
    );
  };

  const konflikte = alleTermine.filter(t => hatKonflikt(t, alleTermine));

  return (
    <div style={{ padding:"16px 16px 60px", maxWidth:700, margin:"0 auto" }}>

      {/* Konflikte Banner */}
      {konflikte.length > 0 && (
        <div style={{ background:"#fdf0ef", border:"1.5px solid #e6b8b2", borderRadius:10, padding:"12px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:20 }}>⚠️</span>
          <div>
            <div style={{ fontWeight:700, color:"#8e2f24" }}>Terminkonflikte erkannt ({konflikte.length})</div>
            <div style={{ fontSize:12, color:"#8e2f24", marginTop:2 }}>Mehrere Termine überschneiden sich zeitlich – bitte prüfen!</div>
          </div>
        </div>
      )}

      {/* ── Tagesplan ── */}
      <div style={{ background:"#fff", border:"1.5px solid #ede8df", borderRadius:12, marginBottom:16, overflow:"hidden" }}>
        <div style={{ background:"#2b2217", color:"#f5f0e8", padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ fontWeight:700, fontSize:15 }}>📋 Tagesplan</div>
          <div style={{ display:"flex", background:"rgba(255,255,255,0.12)", borderRadius:7, padding:2, gap:2 }}>
            {["heute","morgen"].map(t=>(
              <button key={t} onClick={()=>setPlanTag(t)}
                style={{ background:planTag===t?"#fff":"transparent", color:planTag===t?"#2b2217":"#f5f0e8", border:"none", borderRadius:5, padding:"5px 14px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif" }}>
                {t==="heute"?"Heute":"Morgen"}
              </button>
            ))}
          </div>
        </div>
        <div style={{ padding:"14px 16px" }}>
          {tagesTermine.length===0
            ? <div style={{ textAlign:"center", padding:"24px 0", color:"#aaa", fontStyle:"italic" }}>Keine Termine {planTag==="heute"?"heute":"morgen"} 🎉</div>
            : tagesTermine.map(t=><TerminCard key={t.id} t={t} />)
          }
        </div>
      </div>

      {/* ── Wochenansicht ── */}
      <div style={{ background:"#fff", border:"1.5px solid #ede8df", borderRadius:12, marginBottom:16, overflow:"hidden" }}>
        <div style={{ background:"#2b2217", color:"#f5f0e8", padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <button onClick={()=>setWocheOffset(o=>o-1)} style={{ background:"rgba(255,255,255,0.15)", border:"none", color:"#fff", borderRadius:6, padding:"5px 13px", cursor:"pointer", fontSize:16, fontFamily:"Georgia,serif" }}>‹</button>
          <div style={{ fontWeight:700, fontSize:15 }}>
            🗓 {wocheTage[0].getDate()}. {MONATE2[wocheTage[0].getMonth()]} – {wocheTage[6].getDate()}. {MONATE2[wocheTage[6].getMonth()]} {wocheTage[0].getFullYear()}
            {wocheOffset===0&&<span style={{ fontSize:11, background:"#d4a017", color:"#2b2217", borderRadius:5, padding:"1px 7px", marginLeft:8, fontWeight:700 }}>Diese Woche</span>}
          </div>
          <button onClick={()=>setWocheOffset(o=>o+1)} style={{ background:"rgba(255,255,255,0.15)", border:"none", color:"#fff", borderRadius:6, padding:"5px 13px", cursor:"pointer", fontSize:16, fontFamily:"Georgia,serif" }}>›</button>
        </div>
        <div style={{ padding:"12px 14px" }}>
          {wocheTage.map((tag, i) => {
            const iso = ISO(tag);
            const istHeute = iso===ISO(heute);
            const tagTermine = alleTermine.filter(t=>t.datum===iso);
            return (
              <div key={iso} style={{ display:"flex", gap:10, marginBottom:8, opacity:iso<ISO(heute)?0.5:1 }}>
                <div style={{ width:50, flexShrink:0, textAlign:"center" }}>
                  <div style={{ fontSize:11, fontWeight:700, color:istHeute?"#2e7d5e":"#8b7355", textTransform:"uppercase" }}>{WOCHENTAGE[i]}</div>
                  <div style={{ fontSize:20, fontWeight:700, color:istHeute?"#2e7d5e":"#2b2217", background:istHeute?"#edf7f3":"transparent", borderRadius:"50%", width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center", margin:"2px auto" }}>{tag.getDate()}</div>
                </div>
                <div style={{ flex:1, minHeight:40, borderLeft:"2px solid #ede8df", paddingLeft:10 }}>
                  {tagTermine.length===0
                    ? <div style={{ color:"#ccc", fontSize:12, paddingTop:8, fontStyle:"italic" }}>–</div>
                    : tagTermine.map(t => <TerminCard key={t.id} t={t} compact />)
                  }
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Kommende Termine (alle) ── */}
      <div style={{ background:"#fff", border:"1.5px solid #ede8df", borderRadius:12, overflow:"hidden" }}>
        <div style={{ background:"#2b2217", color:"#f5f0e8", padding:"12px 16px", fontWeight:700, fontSize:15 }}>📅 Alle kommenden Termine</div>
        <div style={{ padding:"14px 16px" }}>
          {alleTermine.filter(t=>t.datum>=ISO(heute)).length===0
            ? <div style={{ textAlign:"center", padding:"24px 0", color:"#aaa", fontStyle:"italic" }}>Keine Termine geplant</div>
            : alleTermine.filter(t=>t.datum>=ISO(heute)).map(t=><TerminCard key={t.id} t={t} />)
          }
        </div>
      </div>
    </div>
  );
}

// ─── HAUPT APP ────────────────────────────────────────────────────────────────
function TischlerApp() {
  const STORAGE_KEY = "tischler_projekte_v3";
  const [projekte, setProjekte] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : initialProjects;
      return Array.isArray(parsed) ? parsed : initialProjects;
    } catch (e) {
      console.error("Fehler beim Laden aus localStorage:", e);
      return initialProjects;
    }
  });
  const [bearbeite, setBearbeite] = useState(null);
  const [filter, setFilter] = useState("alle");
  const [suche, setSuche] = useState("");
  const [aufgeklappt, setAufgeklappt] = useState({ 1: true });
  const [aktivTab, setAktivTab] = useState({});
  const [pdfImport, setPdfImport] = useState({ loading:false, parsed:null, error:"" });
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("tischler_ki_apikey") || "");
  const [showApiKey, setShowApiKey] = useState(false);
  const [showSetup, setShowSetup] = useState(() => !localStorage.getItem("tischler_ki_apikey"));
  const [setupKeyInput, setSetupKeyInput] = useState("");
  const [hauptansicht, setHauptansicht] = useState("projekte"); // "projekte" | "planung"

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projekte));
    } catch (e) {
      console.error("Fehler beim Speichern in localStorage:", e);
    }
  }, [projekte]);

  function saveApiKey(key) { setApiKey(key); localStorage.setItem("tischler_ki_apikey", key); setShowApiKey(false); }
  function confirmSetup(key) {
    if (key.trim()) { setApiKey(key.trim()); localStorage.setItem("tischler_ki_apikey", key.trim()); }
    setShowSetup(false);
  }

  function handleKINeueProjekt(data) {
    if (data._prefill) {
      // open edit modal prefilled
      setBearbeite({ ...leerProjekt, kunde: data.kunde||"", auftrag: data.auftrag||"", adresse: data.adresse||"" });
    } else {
      // update existing project (termin added)
      updateProjekt(data);
    }
  }

  const gefiltert = projekte.filter(p => {
    const ms = filter==="alle"||p.status===filter;
    const mq = suche===""||p.kunde.toLowerCase().includes(suche.toLowerCase())||p.auftrag.toLowerCase().includes(suche.toLowerCase());
    return ms&&mq;
  });

  function updateProjekt(updated) { setProjekte(prev=>prev.map(p=>p.id===updated.id?updated:p)); }
  function speichern(p) {
    if (p.id) { setProjekte(prev=>prev.map(x=>x.id===p.id?p:x)); }
    else { setProjekte(prev=>[...prev,{...p,id:Date.now()}]); }
    setBearbeite(null);
  }
  function loeschen(id) {
    if (confirm("Projekt wirklich löschen?")) { setProjekte(prev=>prev.filter(x=>x.id!==id)); setBearbeite(null); }
  }
  function toggleKlapp(id) { setAufgeklappt(prev=>({...prev,[id]:!prev[id]})); }
  function getTab(id) { return aktivTab[id]||"lexoffice"; }
  function setTab(id,tab) { setAktivTab(prev=>({...prev,[id]:tab})); }

  async function handlePdfImport(file) {
    if (!file) return;
    setPdfImport({ loading:true, parsed:null, error:"" });
    try {
      const parsed = await parseOfferPdfFile(file);
      if (!parsed.angebotNr && !parsed.kunde && !parsed.positions.length) {
        throw new Error("Es konnten keine verwertbaren Angebotsdaten erkannt werden.");
      }
      setPdfImport({ loading:false, parsed, error:"" });
    } catch (e) {
      setPdfImport({ loading:false, parsed:null, error:e.message || "PDF konnte nicht gelesen werden." });
    }
  }

  function confirmPdfImport() {
    if (!pdfImport.parsed) return;
    const project = makeImportedProject(pdfImport.parsed);
    const existingIndex = projekte.findIndex(p => (p.lex_angebotsnr||"").trim() === (project.lex_angebotsnr||"").trim() && project.lex_angebotsnr);
    if (existingIndex >= 0) {
      if (!confirm(`Es gibt bereits ein Projekt mit ${project.lex_angebotsnr}. Soll es überschrieben werden?`)) return;
      setProjekte(prev => prev.map((p, idx) => idx === existingIndex ? { ...p, ...project, id: p.id } : p));
    } else {
      setProjekte(prev => [project, ...prev]);
    }
    setPdfImport({ loading:false, parsed:null, error:"" });
  }

  const gesamtBudget = projekte.filter(p=>p.status!=="fertig"&&p.status!=="pausiert").reduce((s,p)=>s+Number(p.budget||0),0);
  const offenBest = projekte.reduce((s,p)=>s+(p.bestellungen||[]).filter(b=>!b.bestellt).length,0);
  const offenZahlung = projekte.filter(p=>p.lex_rechnung&&!p.zahlung_eingegangen&&p.status!=="angebot").length;
  const naechsterT = projekte.flatMap(p=>(p.termine||[]).map(t=>({...t,kunde:p.kunde}))).filter(t=>tageBis(t.datum)>=0).sort((a,b)=>a.datum.localeCompare(b.datum))[0];

  return (
    <div style={{ minHeight:"100vh", background:"#f5f0e8", fontFamily:"Georgia,serif", color:"#2b2217" }}>

      {/* Header */}
      <div style={{ background:"#2b2217", color:"#f5f0e8", padding:"20px 28px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12, position:"relative" }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase" }}>🪵 Tischler Projektverwaltung</div>
          <div style={{ fontSize:11, opacity:0.5, marginTop:2 }}>Projekte · Lexoffice · Kalender · Stunden · Abnahme</div>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
          {/* Hauptnavigation */}
          <div style={{ display:"flex", background:"rgba(255,255,255,0.1)", borderRadius:8, padding:3, gap:2 }}>
            <button onClick={()=>setHauptansicht("projekte")}
              style={{ background:hauptansicht==="projekte"?"#fff":"transparent", color:hauptansicht==="projekte"?"#2b2217":"#f5f0e8", border:"none", borderRadius:6, padding:"7px 14px", fontWeight:700, fontSize:12, cursor:"pointer", fontFamily:"Georgia,serif" }}>
              📁 Projekte
            </button>
            <button onClick={()=>setHauptansicht("planung")}
              style={{ background:hauptansicht==="planung"?"#fff":"transparent", color:hauptansicht==="planung"?"#2b2217":"#f5f0e8", border:"none", borderRadius:6, padding:"7px 14px", fontWeight:700, fontSize:12, cursor:"pointer", fontFamily:"Georgia,serif" }}>
              📅 Planung
            </button>
          </div>
          {/* KI API Key */}
          <button onClick={()=>setShowApiKey(s=>!s)}
            style={{ background:apiKey?"#2e7d5e":"#d4a017", color:apiKey?"#fff":"#2b2217", border:"none", borderRadius:8, padding:"9px 14px", fontWeight:700, fontSize:13, cursor:"pointer" }}
            title={apiKey?"API Key gesetzt – KI aktiv":"API Key setzen für KI-Funktionen"}>
            🤖 {apiKey?"KI aktiv":"API Key"}
          </button>
          {showApiKey&&(
            <div style={{ position:"absolute", top:70, right:28, background:"#fff", border:"1.5px solid #d6cfc4", borderRadius:10, padding:"14px 16px", zIndex:200, minWidth:340, boxShadow:"0 4px 20px #0003" }}>
              <div style={{ fontWeight:700, fontSize:13, marginBottom:8 }}>🤖 Anthropic API Key</div>
              <div style={{ fontSize:12, color:"#8b7355", marginBottom:10, lineHeight:1.5 }}>
                In Claude.ai funktioniert die KI ohne Key. Als lokale HTML-Datei benötigst du einen eigenen Key von <strong>console.anthropic.com</strong>
              </div>
              <input type="password" defaultValue={apiKey} id="apiKeyInput"
                placeholder="sk-ant-api03-..."
                style={{ width:"100%", border:"1.5px solid #d6cfc4", borderRadius:6, padding:"7px 10px", fontSize:13, fontFamily:"Georgia,serif", marginBottom:10, boxSizing:"border-box" }} />
              <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
                {apiKey&&<button onClick={()=>saveApiKey("")} style={{ background:"none", border:"1.5px solid #c0392b", color:"#c0392b", borderRadius:6, padding:"5px 10px", cursor:"pointer", fontSize:12, fontFamily:"Georgia,serif" }}>Entfernen</button>}
                <button onClick={()=>setShowApiKey(false)} style={{ background:"none", border:"1.5px solid #d6cfc4", color:"#888", borderRadius:6, padding:"5px 10px", cursor:"pointer", fontSize:12, fontFamily:"Georgia,serif" }}>Abbrechen</button>
                <button onClick={()=>saveApiKey(document.getElementById("apiKeyInput").value.trim())}
                  style={{ background:"#2b2217", color:"#f5f0e8", border:"none", borderRadius:6, padding:"5px 14px", cursor:"pointer", fontWeight:700, fontSize:12, fontFamily:"Georgia,serif" }}>Speichern</button>
              </div>
            </div>
          )}
          <button
            onClick={() => {
              const data = JSON.stringify(projekte, null, 2);
              const blob = new Blob([data], { type: "application/json" });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = "tischler-projekte-backup.json";
              a.click();
              URL.revokeObjectURL(url);
            }}
            style={{ background:"#fff", color:"#2b2217", border:"none", borderRadius:8, padding:"9px 14px", fontWeight:700, fontSize:13, cursor:"pointer" }}
          >
            Backup exportieren
          </button>
          <label style={{ background:"#fff", color:"#2b2217", borderRadius:8, padding:"9px 14px", fontWeight:700, fontSize:13, cursor:"pointer", display:"inline-flex", alignItems:"center" }}>
            Backup importieren
            <input
              type="file"
              accept=".json,application/json"
              style={{ display:"none" }}
              onChange={(e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                  try {
                    const imported = JSON.parse(ev.target.result);
                    if (!Array.isArray(imported)) throw new Error("Ungültiges Format");
                    setProjekte(imported);
                    alert("Backup erfolgreich importiert.");
                  } catch (err) {
                    alert("Import fehlgeschlagen: ungültige Datei.");
                  }
                };
                reader.readAsText(file);
                e.target.value = "";
              }}
            />
          </label>
          <label style={{ background:"#fff", color:"#2b2217", borderRadius:8, padding:"9px 14px", fontWeight:700, fontSize:13, cursor:"pointer", display:"inline-flex", alignItems:"center" }}>
            PDF-Angebot importieren
            <input
              type="file"
              accept="application/pdf,.pdf"
              style={{ display:"none" }}
              onChange={(e) => {
                const file = e.target.files && e.target.files[0];
                if (file) handlePdfImport(file);
                e.target.value = "";
              }}
            />
          </label>
          <button onClick={()=>setBearbeite({...leerProjekt})} style={{ background:"#d4a017", color:"#2b2217", border:"none", borderRadius:8, padding:"9px 18px", fontWeight:700, fontSize:14, cursor:"pointer" }}>
            + Neues Projekt
          </button>
        </div>
      </div>

      {/* Kennzahlen */}
      <div style={{ display:"flex", gap:12, padding:"16px 28px 0", flexWrap:"wrap" }}>
        {[
          { label:"In Arbeit", wert:projekte.filter(p=>p.status==="in_arbeit").length, farbe:"#2e7d5e" },
          { label:"Angebote", wert:projekte.filter(p=>p.status==="angebot").length, farbe:"#d4a017" },
          { label:"Angebote + Aufträge", wert:`€ ${gesamtBudget.toLocaleString("de-DE")}`, farbe:"#2b2217" },
          { label:"Zu bestellen", wert:offenBest, farbe:offenBest>0?"#c0392b":"#2e7d5e" },
          { label:"Zahlung offen", wert:offenZahlung, farbe:offenZahlung>0?"#c0392b":"#2e7d5e" },
          { label:"Nächster Termin", wert:naechsterT?fmtDate(naechsterT.datum,{day:"2-digit",month:"short"}):"–", farbe:"#4285f4" },
        ].map(k=>(
          <div key={k.label} style={{ background:"#fff", borderRadius:10, padding:"10px 18px", minWidth:100, borderLeft:`4px solid ${k.farbe}`, boxShadow:"0 1px 4px #0001" }}>
            <div style={{ fontSize:18, fontWeight:700, color:k.farbe }}>{k.wert}</div>
            <div style={{ fontSize:11, opacity:0.6, marginTop:1 }}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* KI-Assistent Panel + Projektliste / Planung */}
      {hauptansicht==="planung" ? (
        <PlanungView projekte={projekte} />
      ) : (
        <>
      {/* KI-Assistent Panel */}
      <KIAssistentPanel projekte={projekte} apiKey={apiKey} onNeueProjekt={handleKINeueProjekt} />

      {/* Filter */}
      <div style={{ display:"flex", gap:8, padding:"14px 28px 8px", flexWrap:"wrap", alignItems:"center" }}>
        <input placeholder="Kunde oder Auftrag…" value={suche} onChange={e=>setSuche(e.target.value)}
          style={{ border:"1.5px solid #d6cfc4", borderRadius:8, padding:"7px 13px", fontSize:13, background:"#fff", fontFamily:"Georgia,serif", width:210 }} />
        {["alle","angebot","in_arbeit","fertig","pausiert"].map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{ background:filter===s?"#2b2217":"#fff", color:filter===s?"#f5f0e8":"#2b2217", border:"1.5px solid #d6cfc4", borderRadius:8, padding:"6px 13px", fontSize:12, cursor:"pointer", fontFamily:"Georgia,serif" }}>
            {s==="alle"?"Alle":STATUS[s].label}
          </button>
        ))}
      </div>

      {/* Projektliste */}
      <div style={{ padding:"6px 28px 40px", display:"flex", flexDirection:"column", gap:12 }}>
        {gefiltert.length===0&&<div style={{ textAlign:"center", padding:"48px 0", opacity:0.4 }}>Keine Projekte gefunden.</div>}

        {gefiltert.map(p=>{
          const st = STATUS[p.status];
          const klappt = aufgeklappt[p.id];
          const tab = getTab(p.id);
          const checkDone = (p.checkliste||[]).filter(c=>c.erledigt).length;
          const checkTotal = (p.checkliste||[]).length;
          const allB = (p.bestellungen||[]).length;
          const bestelltB = (p.bestellungen||[]).filter(b=>b.bestellt).length;
          const lexDone = ["lex_angebot","lex_auftragsbestaetigung","lex_lieferschein","lex_rechnung"].filter(k=>p[k]).length;

          return (
            <div key={p.id} style={{ background:"#fff", borderRadius:12, boxShadow:"0 1px 5px #0001", borderLeft:`5px solid ${st.farbe}`, overflow:"hidden" }}>
              {/* Kopf */}
              <div style={{ padding:"14px 18px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", cursor:"pointer" }} onClick={()=>toggleKlapp(p.id)}>
                <span style={{ background:st.bg, color:st.farbe, borderRadius:7, padding:"3px 11px", fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>{st.label}</span>
                <div style={{ flex:1, minWidth:140 }}>
                  <div style={{ fontWeight:700, fontSize:15 }}>{p.kunde}</div>
                  <div style={{ fontSize:12, opacity:0.6, marginTop:1 }}>{p.auftrag}</div>
                  {p.ansprechpartner&&<div style={{ fontSize:11, color:"#8b7355", marginTop:2 }}>👤 {p.ansprechpartner}</div>}
                  {p.notiz&&<div style={{ fontSize:11, color:"#8b7355", fontStyle:"italic", marginTop:2 }}>📝 {p.notiz}</div>}
                </div>
                {/* Mini-Badges */}
                <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                  <span style={{ fontSize:11, color:"#5f6368", background:"#f1f3f4", borderRadius:6, padding:"2px 8px", fontWeight:600 }}>📋 {lexDone}/4</span>
                  {checkTotal>0&&<span style={{ fontSize:11, color:checkDone===checkTotal?"#2e7d5e":"#d4a017", background:checkDone===checkTotal?"#edf7f3":"#fef9ec", borderRadius:6, padding:"2px 8px", fontWeight:600 }}>✅ {checkDone}/{checkTotal}</span>}
                  {allB>0&&<span style={{ fontSize:11, color:bestelltB===allB?"#2e7d5e":"#c0392b", background:bestelltB===allB?"#edf7f3":"#fdf0ef", borderRadius:6, padding:"2px 8px", fontWeight:600 }}>📦 {bestelltB}/{allB}</span>}
                  {p.abnahme_bestaetigt&&<span style={{ fontSize:11, color:"#2e7d5e", background:"#edf7f3", borderRadius:6, padding:"2px 8px", fontWeight:600 }}>🖊 Abgenommen</span>}
                  {p.zahlung_eingegangen&&<span style={{ fontSize:11, color:"#2e7d5e", background:"#edf7f3", borderRadius:6, padding:"2px 8px", fontWeight:600 }}>💶 Bezahlt</span>}
                </div>
                <div style={{ textAlign:"right", display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
                  {p.budget&&<div style={{ fontWeight:700, fontSize:14 }}>€ {Number(p.budget).toLocaleString("de-DE")}</div>}
                  {p.deadline&&<div style={{ fontSize:11, opacity:0.5 }}>📅 {fmtDate(p.deadline)}</div>}
                  <Badge t={tageBis(p.deadline)} />
                </div>
                <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                  <button onClick={e=>{e.stopPropagation();setBearbeite({...p});}} style={{ background:"none", border:"1.5px solid #d6cfc4", borderRadius:7, padding:"4px 10px", cursor:"pointer", fontSize:12, fontFamily:"Georgia,serif" }}>✏️</button>
                  <span style={{ fontSize:16, opacity:0.3 }}>{klappt?"▲":"▼"}</span>
                </div>
              </div>

              {/* Tabs */}
              {klappt&&(
                <div style={{ borderTop:"1px solid #ede8df" }}>
                  <div style={{ display:"flex", overflowX:"auto", borderBottom:"1px solid #ede8df" }}>
                    {TABS.map(t=>(
                      <button key={t.id} onClick={e=>{e.stopPropagation();setTab(p.id,t.id);}}
                        style={{ background:tab===t.id?"#f5f0e8":"#fff", border:"none", borderBottom:tab===t.id?"2px solid #2b2217":"2px solid transparent", padding:"9px 15px", fontSize:12, fontWeight:tab===t.id?700:400, cursor:"pointer", fontFamily:"Georgia,serif", color:"#2b2217", whiteSpace:"nowrap" }}>
                        {t.label}
                      </button>
                    ))}
                  </div>
                  <div style={{ padding:"14px 18px 18px" }}>
                    {tab==="lexoffice"&&<LexofficeTab p={p} onChange={updateProjekt} />}
                    {tab==="checkliste"&&<ChecklisteTab p={p} onChange={updateProjekt} />}
                    {tab==="termine"&&<TermineTab p={p} onChange={updateProjekt} />}
                    {tab==="material"&&<MaterialTab p={p} onChange={updateProjekt} />}
                    {tab==="stunden"&&<StundenTab p={p} onChange={updateProjekt} apiKey={apiKey} />}
                    {tab==="abnahme"&&<AbnahmeTab p={p} onChange={updateProjekt} />}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
        </>
      )}

      {/* ── ERSTEINRICHTUNG KI-SETUP ── */}
      {showSetup && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 0 0"}}>
          <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 22px 36px",width:"100%",maxWidth:520,boxShadow:"0 -4px 40px #0005"}}>
            
            {/* Titel */}
            <div style={{textAlign:"center",marginBottom:22}}>
              <div style={{fontSize:36,marginBottom:8}}>🤖</div>
              <div style={{fontSize:20,fontWeight:700,fontFamily:"Georgia,serif",color:"#2b2217"}}>KI-Assistent einrichten</div>
              <div style={{fontSize:13,color:"#8b7355",marginTop:4}}>Einmalig – dauert 2 Minuten</div>
            </div>

            {/* Schritte */}
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
              {[
                { n:"1", text:"Gehe auf", link:"https://console.anthropic.com", linkText:"console.anthropic.com" },
                { n:"2", text:"Account anlegen (kostenlos) → oben rechts \"API Keys\"" },
                { n:"3", text:"\"Create Key\" → Key kopieren (beginnt mit sk-ant-…)" },
                { n:"4", text:"Hier unten einfügen – wird nur lokal gespeichert" },
              ].map(s=>(
                <div key={s.n} style={{display:"flex",gap:12,alignItems:"flex-start",background:"#faf7f2",borderRadius:10,padding:"10px 13px"}}>
                  <div style={{background:"#2b2217",color:"#f5f0e8",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0,marginTop:1}}>{s.n}</div>
                  <div style={{fontSize:13,lineHeight:1.5,fontFamily:"Georgia,serif"}}>
                    {s.text}
                    {s.link && <> <a href={s.link} target="_blank" rel="noopener noreferrer" style={{color:"#2e7d5e",fontWeight:700}}>{s.linkText}</a></>}
                  </div>
                </div>
              ))}
            </div>

            {/* Kosten Hinweis */}
            <div style={{background:"#edf7f3",border:"1px solid #b2dfc9",borderRadius:10,padding:"10px 13px",marginBottom:18,fontSize:12,color:"#2e7d5e",lineHeight:1.5}}>
              💡 <strong>Kosten:</strong> Ca. 0,01–0,05 € pro Nachrichtenanalyse. Mit 5 $ Guthaben kommst du Monate aus. Abrechnung nur was du nutzt.
            </div>

            {/* Eingabe */}
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:"#8b7355",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>API Key einfügen</label>
              <input
                type="text"
                value={setupKeyInput}
                onChange={e=>setSetupKeyInput(e.target.value)}
                placeholder="sk-ant-api03-..."
                style={{width:"100%",border:"2px solid #d6cfc4",borderRadius:10,padding:"13px 14px",fontSize:14,fontFamily:"Georgia,serif",boxSizing:"border-box",background:"#fff"}}
                autoFocus
              />
            </div>

            {/* Buttons */}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>confirmSetup(setupKeyInput)}
                style={{background:"#2b2217",color:"#f5f0e8",border:"none",borderRadius:12,padding:"15px",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",width:"100%"}}>
                {setupKeyInput.trim() ? "✓ KI aktivieren" : "Ohne KI weitermachen →"}
              </button>
              {!setupKeyInput.trim() && (
                <div style={{textAlign:"center",fontSize:11,color:"#aaa"}}>KI-Funktionen sind dann nicht verfügbar · Key jederzeit über 🤖-Button nachtragen</div>
              )}
            </div>
          </div>
        </div>
      )}
      {(pdfImport.loading || pdfImport.error || pdfImport.parsed) && (
        <div style={{ position:"fixed", inset:0, background:"#0007", display:"flex", alignItems:"center", justifyContent:"center", zIndex:110, padding:16 }}
          onClick={e=>e.target===e.currentTarget&&!pdfImport.loading&&setPdfImport({ loading:false, parsed:null, error:"" })}>
          <div style={{ background:"#faf7f2", borderRadius:16, padding:"24px 22px 20px", width:"100%", maxWidth:900, boxShadow:"0 8px 40px #0004", maxHeight:"92vh", overflowY:"auto" }}>
            <div style={{ fontSize:18, fontWeight:700, marginBottom:14 }}>PDF-Angebot importieren</div>

            {pdfImport.loading && <div style={{ padding:"24px 0", fontSize:15 }}>PDF wird gelesen und geprüft…</div>}

            {pdfImport.error && !pdfImport.loading && (
              <div>
                <div style={{ background:"#fdf0ef", color:"#8e2f24", border:"1px solid #e6b8b2", borderRadius:10, padding:"12px 14px", marginBottom:14 }}>
                  {pdfImport.error}
                </div>
                <div style={{ display:"flex", justifyContent:"flex-end" }}>
                  <button onClick={()=>setPdfImport({ loading:false, parsed:null, error:"" })} style={btnOutline("#888")}>Schließen</button>
                </div>
              </div>
            )}

            {pdfImport.parsed && !pdfImport.loading && (
              <div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(4, minmax(0, 1fr))", gap:10, marginBottom:14 }}>
                  {[
                    { label:"Datei", wert:pdfImport.parsed.fileName || "—" },
                    { label:"Angebotsnr.", wert:pdfImport.parsed.angebotNr || "—" },
                    { label:"Datum", wert:pdfImport.parsed.datum || "—" },
                    { label:"Gültig bis", wert:pdfImport.parsed.gueltigBis || "—" },
                  ].map(k => (
                    <div key={k.label} style={{ background:"#fff", border:"1px solid #e7dfd3", borderRadius:10, padding:"10px 12px" }}>
                      <div style={{ fontSize:11, opacity:0.55, textTransform:"uppercase", letterSpacing:0.5 }}>{k.label}</div>
                      <div style={{ fontWeight:700, marginTop:3, fontSize:14 }}>{k.wert}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1.2fr 1fr 1fr", gap:10, marginBottom:14 }}>
                  <div style={{ background:"#fff", border:"1px solid #e7dfd3", borderRadius:10, padding:"10px 12px" }}>
                    <div style={{ fontSize:11, opacity:0.55, textTransform:"uppercase", letterSpacing:0.5 }}>Kunde</div>
                    <div style={{ fontWeight:700, marginTop:3 }}>{pdfImport.parsed.kunde || "—"}</div>
                    <div style={{ fontSize:13, color:"#666", marginTop:4 }}>{pdfImport.parsed.adresse || "—"}</div>
                  </div>
                  <div style={{ background:"#fff", border:"1px solid #e7dfd3", borderRadius:10, padding:"10px 12px" }}>
                    <div style={{ fontSize:11, opacity:0.55, textTransform:"uppercase", letterSpacing:0.5 }}>Auftrag</div>
                    <div style={{ fontWeight:700, marginTop:3 }}>{pdfImport.parsed.auftrag || "—"}</div>
                  </div>
                  <div style={{ background:"#fff", border:"1px solid #e7dfd3", borderRadius:10, padding:"10px 12px" }}>
                    <div style={{ fontSize:11, opacity:0.55, textTransform:"uppercase", letterSpacing:0.5 }}>Gesamtbetrag erkannt</div>
                    <div style={{ fontWeight:700, marginTop:3 }}>€ {Number(pdfImport.parsed.budget || 0).toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                  </div>
                </div>

                <div style={{ background:"#fff", border:"1px solid #e7dfd3", borderRadius:10, padding:"10px 12px", marginBottom:14 }}>
                  <div style={{ fontSize:11, opacity:0.55, textTransform:"uppercase", letterSpacing:0.5, marginBottom:8 }}>Erkannte Positionen</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {pdfImport.parsed.positions.length ? pdfImport.parsed.positions.map((pos, idx) => (
                      <div key={idx} style={{ border:"1px solid #efe7db", borderRadius:8, padding:"8px 10px", background:pos.optional ? "#faf7f2" : "#fffdf8" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", gap:10, flexWrap:"wrap" }}>
                          <div style={{ fontWeight:700 }}>{pos.pos} · {pos.title || "Ohne Titel"}</div>
                          <div style={{ whiteSpace:"nowrap", fontWeight:700 }}>
                            {pos.qtyText ? `${pos.qtyText} · ` : ""}€ {Number(pos.gesamtpreis || 0).toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                            {pos.optional && <span style={{ marginLeft:8, color:"#8b7355", fontWeight:400 }}>(optional)</span>}
                          </div>
                        </div>
                        {pos.details && <div style={{ fontSize:12, color:"#666", marginTop:4 }}>{pos.details}</div>}
                      </div>
                    )) : <div style={{ color:"#999", fontStyle:"italic" }}>Keine Positionen erkannt.</div>}
                  </div>
                </div>

                <div style={{ fontSize:12, color:"#8b7355", marginBottom:14 }}>
                  Beim Import wird ein neues Projekt angelegt. Pflicht-Positionen werden in Material übernommen. Optionale Positionen landen in der Notiz.
                </div>

                <div style={{ display:"flex", justifyContent:"flex-end", gap:10 }}>
                  <button onClick={()=>setPdfImport({ loading:false, parsed:null, error:"" })} style={btnOutline("#888")}>Abbrechen</button>
                  <button onClick={confirmPdfImport} style={{ background:"#2e7d5e", color:"#fff", border:"none", borderRadius:8, padding:"8px 18px", cursor:"pointer", fontWeight:700, fontFamily:"Georgia,serif" }}>
                    Als Projekt importieren
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Modal: Projekt anlegen / bearbeiten */}
      {bearbeite&&(
        <div style={{ position:"fixed", inset:0, background:"#0007", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, padding:16 }}
          onClick={e=>e.target===e.currentTarget&&setBearbeite(null)}>
          <div style={{ background:"#faf7f2", borderRadius:16, padding:"28px 24px 22px", width:"100%", maxWidth:500, boxShadow:"0 8px 40px #0004", maxHeight:"92vh", overflowY:"auto" }}>
            <div style={{ fontSize:17, fontWeight:700, marginBottom:18 }}>{bearbeite.id?"Projekt bearbeiten":"Neues Projekt anlegen"}</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {[
                {key:"kunde",label:"Kunde *",type:"text",placeholder:"z.B. Familie Müller",full:true},
                {key:"auftrag",label:"Auftrag *",type:"text",placeholder:"z.B. Einbauküche Eiche",full:true},
                {key:"ansprechpartner",label:"Ansprechpartner",type:"text",placeholder:"z.B. Thomas Müller"},
                {key:"telefon",label:"Telefon",type:"text",placeholder:"0171 …"},
                {key:"adresse",label:"Adresse",type:"text",placeholder:"Musterstr. 1, 80331 München",full:true},
                {key:"deadline",label:"Deadline",type:"date"},
                {key:"budget",label:"Budget (€)",type:"number",placeholder:"0"},
              ].map(({key,label,type,placeholder,full})=>(
                <div key={key} style={{ gridColumn:full?"1/-1":"auto" }}>
                  <label style={labelSt}>{label}</label>
                  <input type={type} value={bearbeite[key]||""} placeholder={placeholder} onChange={e=>setBearbeite(p=>({...p,[key]:e.target.value}))} style={inp} />
                </div>
              ))}
              <div style={{ gridColumn:"1/-1" }}>
                <label style={labelSt}>Status</label>
                <select value={bearbeite.status} onChange={e=>setBearbeite(p=>({...p,status:e.target.value}))} style={inp}>
                  {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                </select>
              </div>
              <div style={{ gridColumn:"1/-1" }}>
                <label style={labelSt}>Notiz</label>
                <textarea value={bearbeite.notiz||""} placeholder="z.B. Sonderwunsch, Besonderheiten…" onChange={e=>setBearbeite(p=>({...p,notiz:e.target.value}))} rows={2}
                  style={{ ...inp, resize:"vertical" }} />
              </div>
            </div>
            <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:18 }}>
              {bearbeite.id&&<button onClick={()=>loeschen(bearbeite.id)} style={{ background:"none", border:"1.5px solid #c0392b", color:"#c0392b", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontSize:13, fontFamily:"Georgia,serif" }}>Löschen</button>}
              <button onClick={()=>setBearbeite(null)} style={{ background:"none", border:"1.5px solid #d6cfc4", color:"#2b2217", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontSize:13, fontFamily:"Georgia,serif" }}>Abbrechen</button>
              <button onClick={()=>{if(!bearbeite.kunde||!bearbeite.auftrag){alert("Bitte Kunde und Auftrag ausfüllen.");return;}speichern(bearbeite);}}
                style={{ background:"#2b2217", color:"#f5f0e8", border:"none", borderRadius:8, padding:"8px 20px", cursor:"pointer", fontWeight:700, fontSize:14, fontFamily:"Georgia,serif" }}>
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<TischlerApp />);
  </script>
</body>
</html>
